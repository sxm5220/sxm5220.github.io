---
layout: default
make-smaller-titles: true
---


<div class="container-fluid index">
    <div class="row">

        <div class="col-md-12 main content-panel">

            <div class="gravatar">
                <img src="{{ site.title_image }}" class="img-circle about-image" height="140" width="140" alt="{{ site.title }}" />
            </div>

            <h3 class="header author-header" itemprop="headline">{{ site.title }}</h3>

            <div class="author-text">
                <h4>{{ site.title_description }}</h4>
            </div>

            <!--{% include social_links.html %}-->
          </div>
          <div class="col-md-12 main content-panel">

            <div class="articles">

              <ul>
                  {% for post in site.posts limit: site.post_limit %}

                      <li>
                          <a href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a>
                          <small class="hidden-xs">{{ post.date | date: "%B %-d, %Y" }}</small>
                      </li>

                  {% endfor %}
                  <li>
                      <small><i><a href="{{ site.baseurl }}/posts/"><h2 class="header author-header">更多...</h2></a></i></small>
                  </li>
              </ul>

            </div>

        </div>

    </div>
    
</div>
